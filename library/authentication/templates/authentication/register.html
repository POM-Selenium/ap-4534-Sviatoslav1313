{% extends 'base.html' %}

{% block title %}Register — Library{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Create Account</h2>
    <p class="subtitle">Join the library as a visitor or librarian</p>

    <form method="post" action="{% url 'register' %}">
        {% csrf_token %}

        <div class="form-group">
            <label for="first_name">First Name</label>
            <input type="text" id="first_name" name="first_name" placeholder="Enter your first name" maxlength="20">
        </div>

        <div class="form-group">
            <label for="last_name">Last Name</label>
            <input type="text" id="last_name" name="last_name" placeholder="Enter your last name" maxlength="20">
        </div>

        <div class="form-group">
            <label for="middle_name">Middle Name</label>
            <input type="text" id="middle_name" name="middle_name" placeholder="Enter your middle name" maxlength="20">
        </div>

        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>

        <div class="form-group">
            <label for="password">Password *</label>
            <input type="password" id="password" name="password" placeholder="Create a password" required>
        </div>

        <div class="form-group">
            <label for="password_confirm">Confirm Password *</label>
            <input type="password" id="password_confirm" name="password_confirm" placeholder="Repeat your password" required>
        </div>

        <div class="form-group">
            <label for="role">Role</label>
            <select id="role" name="role">
                <option value="0">Visitor (Guest)</option>
                <option value="1">Librarian (Admin)</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Register</button>
    </form>

    <div class="form-footer">
        Already have an account? <a href="{% url 'login' %}">Log in</a>
    </div>
</div>
{% endblock %}
